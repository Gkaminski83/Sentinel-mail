version: '3.8'
services:
  backend:
    build: ./backend
    environment:
      - ACCOUNTS_JSON=[{"host":"imap.example.com","username":"user@example.com","password":"password"}]
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
